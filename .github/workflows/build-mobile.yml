name: Build mobile (EAS)

# Builds the Android + iOS apps with EAS Build when a GitHub Release is
# published (not on every commit). Manual runs supported via the Actions tab,
# where you can pick a single platform.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      platform:
        description: Platforms to build
        type: choice
        options: [all, android, ios]
        default: all

concurrency:
  group: build-mobile
  cancel-in-progress: false

jobs:
  build:
    name: eas build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build
        env:
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
        run: eas build --platform ${{ github.event.inputs.platform || 'all' }} --profile production --non-interactive --no-wait
