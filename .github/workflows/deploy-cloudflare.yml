name: Deploy Cloudflare Pages

# Deploys cloudflare/public + cloudflare/functions to production aihoni.com
# only when a GitHub Release is published (not on every commit/push).
# Manual runs are also supported via the Actions tab.

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler pages deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.90.0'
          workingDirectory: cloudflare
          command: pages deploy public --project-name=aihoni --branch=main --commit-dirty=true
